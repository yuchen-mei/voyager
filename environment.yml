name: accelerator-env
channels:
  - pytorch
  - conda-forge
dependencies:
  - libprotobuf
  - python=3.9
  - pytorch==2.3.1
  - torchvision==0.18.1
  - torchaudio==2.3.1
  - pip
  - pip:
      - deepdiff
      - xonsh
      - git+https://github.com/mflowgen/mflowgen.git@69412255acc2c509e98105804e5a97d9738ddfe1#egg=mflowgen
      - pandas
      - -r quantized-training/requirements.txt
      - -e quantized-training
      - -e interstellar
